name: stayspot
description: "StaySpot - Airbnb Clone"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # HTTP Client
  dio: ^5.7.0

  # Local Storage
  shared_preferences: ^2.3.4

  # Image Caching
  cached_network_image: ^3.4.1

  # Animations
  flutter_animate: ^4.5.2

  # Date Picker
  table_calendar: ^3.1.3

  # Forms
  flutter_form_builder: ^10.3.0
  form_builder_validators: ^11.1.0

  # Maps
  google_maps_flutter: ^2.10.0

  # Utils
  intl: ^0.20.2
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.14
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.3

flutter:
  uses-material-design: true
